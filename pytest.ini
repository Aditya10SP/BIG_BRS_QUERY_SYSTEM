[pytest]
# Pytest configuration for Graph RAG Layer

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Markers for categorizing tests
markers =
    unit: Unit tests for individual components
    integration: Integration tests across components
    property: Property-based tests using hypothesis
    slow: Tests that take significant time to run
    requires_storage: Tests that require storage services (Qdrant, Neo4j, PostgreSQL)
    requires_llm: Tests that require LLM service

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage options
[coverage:run]
source = src,config
omit =
    */tests/*
    */__pycache__/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
