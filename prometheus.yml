# Prometheus configuration for Graph RAG Layer

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'graph-rag-layer'
    environment: 'development'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Load rules once and periodically evaluate them
# rule_files:
#   - "alerts.yml"

# Scrape configurations
scrape_configs:
  # Graph RAG API service
  - job_name: 'graph-rag-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s

  # Graph RAG Worker service
  # Note: Workers need to expose metrics endpoint
  # - job_name: 'graph-rag-worker'
  #   static_configs:
  #     - targets: ['worker:8000']
  #   metrics_path: '/metrics'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # PostgreSQL exporter (optional)
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # Neo4j metrics (optional)
  # - job_name: 'neo4j'
  #   static_configs:
  #     - targets: ['neo4j:2004']
  #   metrics_path: '/metrics'

  # Redis exporter (optional)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
